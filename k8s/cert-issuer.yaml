# cert-manager ClusterIssuers for Let's Encrypt. HTTP-01 challenge solved through APISIX
# (the controller programs a temporary Ingress on :80 for /.well-known/acme-challenge/*),
# so it works with any DNS provider (GoDaddy here) — no DNS-API integration needed.
#
# Requires: cert-manager installed (helm/deploy.sh applies it), the gateway reachable on
# port 80 at the challenged hostname, and the apisix IngressClass wired (k8s/ingressclass.yaml).
#
# Use letsencrypt-staging first if iterating (untrusted cert, but no rate limits); switch the
# Certificate's issuerRef to letsencrypt-prod once the flow works.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: faithandgamble822@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: apisix
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: faithandgamble822@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: apisix
