# NAMESPACE NOTE: this ApisixRoute lives in sfg-labs (set via metadata.namespace) because
# the APISIX ingress controller (ApisixRoute v2) routes only to Services in the route's OWN
# namespace — backends[].serviceNamespace is not supported. All Suwalka routes therefore live
# in sfg-labs, alongside the suwalka-* Service objects. sfg-labs (not sfg-apps) is correct for
# Suwalka per CLAUDE.md and the confirmed k8s Service definition.
#
# OPEN QUESTIONS FOR PLATFORM TEAM:
#   1. Confirm Zitadel realm name "suwalka" is provisioned. If the realm is named
#      differently in Zitadel (e.g. "suwalka-pos"), update the `realm:` field below.
#   2. X-Tenant-Id / X-Branch-Id injection: no existing route in this repo explicitly
#      injects these headers via a proxy-rewrite plugin. Confirm whether Zitadel custom
#      claims flow them through the X-Userinfo blob (parsed by readUser()) or whether a
#      dedicated proxy-rewrite block is needed.
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: suwalka-org-hr-payroll
  namespace: sfg-labs
  labels:
    sfg-project: suwalka
    sfg-auth: jwt
  annotations:
    sfg-labs.in/description: "Suwalka Motors — Org / HR / Payroll service API"
    sfg-labs.in/team: "suwalka-team"
    sfg-labs.in/upstream: "suwalka-org-hr-payroll:3001"
spec:
  ingressClassName: apisix
  http:
  - name: suwalka-org-hr-payroll-api
    match:
      hosts:
      - api.suwalka-pos.sfg-labs.in
      - api.faithandgamble.in
      paths:
      - /api/hr/*
      - /api/recruitment/*
      - /api/perf/*
      - /api/docs/*
      - /api/helpdesk/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    backends:
    - serviceName: suwalka-org-hr-payroll
      servicePort: 3001
      weight: 100
    plugins:
    # Browser clients (admin-web) call this JWT-protected route directly, which
    # triggers a CORS preflight OPTIONS with no Authorization header. The cors
    # plugin runs at a higher APISIX priority than openid-connect, so it answers
    # the preflight itself (never reaching the auth check) and still stamps
    # Access-Control-Allow-Origin on the real response once a bearer token gets
    # through. First protected route in this repo with `cors` — the pattern
    # mirrors routes/suwalka-auth.yaml's public rule; use it as the template for
    # any other protected route a browser calls directly.
    - name: cors
      enable: true
      config:
        allow_origins: "http://localhost:3000,https://suwalka.faithandgamble.in,https://suwalka-dev.faithandgamble.in,http://suwalka-dev.faithandgamble.in"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "*"
        allow_credential: false
        max_age: 3600
    - name: openid-connect
      enable: true
      config:
        discovery: https://sfg-labs.faithandgamble.in/.well-known/openid-configuration
        bearer_only: true
        client_id: "bearer-only-unused"
        client_secret: "bearer-only-unused"
        realm: suwalka
        use_jwks: true
        set_userinfo_header: true
        userinfo_header_name: X-Userinfo
        set_id_token_header: false
        set_access_token_header: false
        token_signing_alg_values_expected: RS256
        timeout: 3
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 60
        burst: 30
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka
