# Public routes — no JWT required.
# Covers: Zitadel auth endpoints, health checks, Razorpay webhooks.
# WARNING: Adding a path here means ANY caller can reach it unauthenticated.
#          Review every addition carefully before merging.
#
# NOTE: This APISIX ingress controller (ApisixRoute apisix.apache.org/v2) routes only to
# Services in the ApisixRoute's OWN namespace — there is no backends[].serviceNamespace.
# So the public routes are split into one ApisixRoute per backend namespace.
---
# --- sfg-gateway backends (Zitadel) ---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: public-routes-gateway
  namespace: sfg-gateway
  labels:
    sfg-auth: public
  annotations:
    sfg-labs.in/description: "Public routes — Zitadel auth server"
spec:
  ingressClassName: apisix
  http:

  # Zitadel auth server — all traffic, no JWT check (Zitadel handles its own auth)
  - name: zitadel-auth
    match:
      hosts:
      - sfg-labs.faithandgamble.in
      paths:
      - /*
    backends:
    - serviceName: sfg-zitadel
      servicePort: 8080
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        # Zitadel serves a SPA (console) — one page load fetches many JS chunks/assets at once,
        # so this must be generous or the browser gets 429s and the console shows a white screen.
        rate: 200
        burst: 200
        rejected_code: 429
        key_type: var
        key: remote_addr

  # Zitadel login v2 — served by the separate sfg-zitadel-login service (port 3000), NOT :8080.
  # Higher priority so /ui/v2/login/* wins over the zitadel-auth /* catch-all above.
  - name: zitadel-login-v2
    priority: 10
    match:
      hosts:
      - sfg-labs.faithandgamble.in
      paths:
      - /ui/v2/login
      - /ui/v2/login/*
    backends:
    - serviceName: sfg-zitadel-login
      servicePort: 3000
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 200
        burst: 200
        rejected_code: 429
        key_type: var
        key: remote_addr
---
# --- sfg-apps backends (NMA / Baithak / CMS) ---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: public-routes-apps
  namespace: sfg-apps
  labels:
    sfg-auth: public
  annotations:
    sfg-labs.in/description: "Public routes — NMA/Baithak/CMS health + webhooks"
spec:
  ingressClassName: apisix
  http:

  # NMA health check — explicit paths only, no wildcard
  - name: nma-health
    match:
      hosts:
      - api.nma-india.in
      paths:
      - /health
      - /health/live
      - /health/ready
      methods:
      - GET
    backends:
    - serviceName: nma-india-engine
      servicePort: 3000
      weight: 100

  # Baithak health check — explicit paths only
  - name: baithak-health
    match:
      hosts:
      - api.baithak.live
      paths:
      - /health
      - /health/live
      - /health/ready
      methods:
      - GET
    backends:
    - serviceName: baithak-api
      servicePort: 8000
      weight: 100

  # Razorpay webhook — own route, strict rate limit, POST only.
  # IMPORTANT: Baithak service MUST validate X-Razorpay-Signature on every request.
  # Signature = HMAC-SHA256(webhook_secret, raw_request_body).
  # Razorpay IPs change; do not rely on IP allowlisting alone.
  - name: baithak-razorpay-webhook
    match:
      hosts:
      - api.baithak.live
      paths:
      - /webhooks/razorpay
      methods:
      - POST
    backends:
    - serviceName: baithak-api
      servicePort: 8000
      weight: 100
    plugins:
    - name: limit-req
      enable: true
      config:
        rate: 5
        burst: 2
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true

  # CMS health check — explicit paths only
  - name: cms-health
    match:
      hosts:
      - api.cms.sfg-labs.in
      paths:
      - /health
      - /health/live
      - /health/ready
      methods:
      - GET
    backends:
    - serviceName: cms-api
      servicePort: 8001
      weight: 100
---
# --- sfg-labs backends (Suwalka) ---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: public-routes-suwalka
  namespace: sfg-labs
  labels:
    sfg-auth: public
  annotations:
    sfg-labs.in/description: "Public routes — Suwalka health"
spec:
  ingressClassName: apisix
  http:

  # Suwalka HR/Payroll health check — /healthz (service uses /healthz, not /health)
  - name: suwalka-hr-health
    match:
      hosts:
      - api.suwalka-pos.sfg-labs.in
      paths:
      - /healthz
      methods:
      - GET
    backends:
    - serviceName: suwalka-org-hr-payroll
      servicePort: 3001
      weight: 100

  # Bare /org/swagger → 301 → /org/swagger/ (trailing slash).
  #
  # WHY THIS RULE EXISTS — the bare path must NEVER reach the upstream.
  # If it does, proxy-rewrite forwards it as /docs and swagger-ui-express answers with its
  # own redirect to the trailing-slash form — but that Location is the service's INTERNAL
  # path (`Location: /docs/`), which has no route on this gateway. The browser follows it
  # and lands on 404 Route Not Found. Redirecting here, at the edge, keeps the Location in
  # the EXTERNAL path namespace, so the upstream only ever sees /docs/ and never gets the
  # chance to leak /docs/.
  #
  # The trailing slash itself is not cosmetic: swagger-ui's assets are relative
  # (./swagger-ui.css), so they only resolve against /org/swagger/ — serving the UI at the
  # bare path would 404 every asset. A redirect is the correct shape, not a second proxy.
  #
  # The `redirect` plugin short-circuits during the rewrite phase, so `backends` below is
  # never contacted — it is present only because the CRD and tests/validate-routes.sh
  # require every rule to declare one.
  #
  # MUST stay EXACTLY the bare path (no /* wildcard), and the proxy rule below must NOT
  # also list it — the two rules are deliberately DISJOINT. If this rule ever matched
  # /org/swagger/ or an asset path, it would redirect to itself: an infinite loop.
  - name: suwalka-hr-docs-redirect
    match:
      hosts:
      - api.suwalka-pos.sfg-labs.in
      - api.faithandgamble.in
      paths:
      - /org/swagger
      methods:
      - GET
    backends:
    - serviceName: suwalka-org-hr-payroll
      servicePort: 3001
      weight: 100
    plugins:
    - name: redirect
      enable: true
      config:
        uri: /org/swagger/
        ret_code: 301

  # Suwalka HR/Payroll Swagger UI — public read-only API docs, no auth required.
  # External path is /org/swagger/(*); service actually serves it at /docs, so
  # proxy-rewrite strips the external prefix before forwarding upstream.
  # /org/swagger/* also matches the bare trailing-slash form /org/swagger/ (the wildcard
  # matches empty), which is the path the redirect rule above sends browsers to.
  # The bare, slash-less /org/swagger is intentionally NOT listed here — see that rule.
  - name: suwalka-hr-docs
    match:
      hosts:
      - api.suwalka-pos.sfg-labs.in
      - api.faithandgamble.in
      paths:
      - /org/swagger/*
      methods:
      - GET
    backends:
    - serviceName: suwalka-org-hr-payroll
      servicePort: 3001
      weight: 100
    plugins:
    - name: proxy-rewrite
      enable: true
      config:
        regex_uri:
        - "^/org/swagger(.*)"
        - "/docs$1"
