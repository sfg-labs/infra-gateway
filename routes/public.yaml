# Public routes — no JWT required.
# Covers: Zitadel auth endpoints, health checks, Razorpay webhooks.
# WARNING: Adding a path here means ANY caller can reach it unauthenticated.
#          Review every addition carefully before merging.
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: public-routes
  namespace: sfg-gateway
  labels:
    sfg-auth: public
  annotations:
    sfg-labs.in/description: "Public routes — login, health, webhooks"
spec:
  http:

  # Zitadel auth server — all traffic, no JWT check (Zitadel handles its own auth)
  - name: zitadel-auth
    match:
      hosts:
      - auth.sfg-labs.in
      paths:
      - /*
    backends:
    - serviceName: sfg-zitadel
      serviceNamespace: sfg-gateway
      servicePort: 8080
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 20
        burst: 10
        rejected_code: 429
        key_type: var
        key: remote_addr

  # NMA health check — explicit paths only, no wildcard
  - name: nma-health
    match:
      hosts:
      - api.nma-india.in
      paths:
      - /health
      - /health/live
      - /health/ready
      methods:
      - GET
    backends:
    - serviceName: nma-india-engine
      serviceNamespace: sfg-apps
      servicePort: 3000
      weight: 100

  # Baithak health check — explicit paths only
  - name: baithak-health
    match:
      hosts:
      - api.baithak.live
      paths:
      - /health
      - /health/live
      - /health/ready
      methods:
      - GET
    backends:
    - serviceName: baithak-api
      serviceNamespace: sfg-apps
      servicePort: 8000
      weight: 100

  # Razorpay webhook — own route, strict rate limit, POST only.
  # IMPORTANT: Baithak service MUST validate X-Razorpay-Signature on every request.
  # Signature = HMAC-SHA256(webhook_secret, raw_request_body).
  # Razorpay IPs change; do not rely on IP allowlisting alone.
  - name: baithak-razorpay-webhook
    match:
      hosts:
      - api.baithak.live
      paths:
      - /webhooks/razorpay
      methods:
      - POST
    backends:
    - serviceName: baithak-api
      serviceNamespace: sfg-apps
      servicePort: 8000
      weight: 100
    plugins:
    - name: limit-req
      enable: true
      config:
        rate: 5
        burst: 2
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true

  # CMS health check — explicit paths only
  - name: cms-health
    match:
      hosts:
      - api.cms.sfg-labs.in
      paths:
      - /health
      - /health/live
      - /health/ready
      methods:
      - GET
    backends:
    - serviceName: cms-api
      serviceNamespace: sfg-apps
      servicePort: 8001
      weight: 100
