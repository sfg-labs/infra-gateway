# Public API host for Suwalka services: api.faithandgamble.in (path per service).
# Shares the existing APISIX gateway LoadBalancer IP (168.144.48.171) — no new IP/LB.
# TLS is issued by cert-manager and served by APISIX (ApisixTls). The Certificate +
# ApisixTls below are HOST-level (shared): future services just add their own
# ApisixRoute on this same host (e.g. /api/hr/*) and reuse this cert.
#
# auth is reached at:
#   PUBLIC (no token):  /auth/login | /auth/refresh | /auth/logout | /auth/docs
#   PUBLIC (no token):  /auth/password/change   (own rule — tighter rate limit)
#   PROTECTED (JWT):    /auth/admin/*
# (login/refresh/logout are POST; /auth/docs is the Swagger UI. /healthz stays
#  pod-internal for k8s probes — not exposed through the gateway.)
# auth serves these paths natively, so no path rewrite is needed.
#
# ---------------------------------------------------------------------------
# RATE LIMITING — READ THIS BEFORE CHANGING ANY `rate`/`burst` BELOW.
#
# The `key: remote_addr` used here (and in all 16 other route files) does NOT
# reliably identify the client on this cluster. Verified 2026-07-20 against the
# live gateway:
#
#   * service sfg-apisix-gateway has externalTrafficPolicy: Cluster
#   * the DO LB is do-loadbalancer-type: REGIONAL_NETWORK — an L4/TCP
#     passthrough LB. It adds no X-Forwarded-For, and PROXY protocol is not
#     enabled. api.faithandgamble.in is NOT proxied by Cloudflare, so there is
#     no CF-Connecting-IP either.
#   * there is exactly 1 APISIX replica, on node pool-9t8ale6vb-3c8xw1
#     (10.104.0.2), in a 3-node cluster.
#
# With etp=Cluster, a connection landing on either of the two nodes that do NOT
# host the APISIX pod is SNAT'd by kube-proxy, so remote_addr becomes the node
# IP. Sampled access logs confirm it: real POST /auth/login traffic arrives as
# 10.104.0.3 / 10.104.0.4 (the two non-hosting nodes) roughly two times out of
# three, and only keeps the true client IP on the remaining ~1/3.
#
# CONSEQUENCE: for most traffic these limits are NOT per-client. They collapse
# into two shared buckets and behave as a near-global cap. A *tight* per-IP
# limit here would therefore not throttle an attacker per-identity — it would
# let one attacker exhaust the shared bucket and 429 every legitimate user,
# turning this control into a platform-wide login outage.
#
# The numbers below are therefore deliberately sized as a coarse VOLUMETRIC
# BACKSTOP against floods, with wide headroom over real peak load. They are
# explicitly NOT an anti-brute-force / anti-enumeration control.
#
# WHAT ACTUALLY PROTECTS THESE ROUTES TODAY — read this before relying on any
# compensating control. Verified 2026-07-20 against the live Zitadel DB
# (projections.lockout_policies3): max_password_attempts = 0 and
# max_otp_attempts = 0 on the default policy. In Zitadel, 0 means UNLIMITED.
# There is therefore NO per-account lockout anywhere in the stack right now.
# An earlier draft of this file deferred to "per-account lockout in
# suwalka-auth / Zitadel" as the real control; that control DOES NOT EXIST.
#
# So the honest inventory of what stands between an attacker and a password
# guess is exactly three things:
#   1. these volumetric limit-req caps (shared-bucket, see above — they cap
#      total volume, they cannot single out the attacker);
#   2. the 1200ms constant-time response floor suwalka-auth applies to every
#      password-change response, which caps useful concurrency far more
#      effectively than it caps rate;
#   3. one-time passwords being handed over in person and short-lived.
# That is thin. The genuine fix is to set max_password_attempts to a non-zero
# value in Zitadel; it is tracked as a follow-up to the PR opening this file
# and should not be assumed done just because this comment mentions it.
#
# Do not tighten these numbers expecting brute-force protection until source-IP
# preservation is fixed (etp=Local with APISIX scaled to >=3 replicas or run as
# a DaemonSet, or PROXY protocol enabled on the DO LB and in APISIX). See the
# PR opening this file for detail.
#
# HOW TO READ `rate` AND `burst` (this was got wrong in an earlier draft):
# APISIX limit-req is a LEAKY BUCKET (resty.limit.req). `rate` is the SUSTAINED
# admitted throughput. `burst` is the amount of excess that is allowed to be
# DELAYED (the plugin sleeps the request) rather than admitted for free —
# anything beyond rate+burst is rejected with `rejected_code`. So the sustained
# ceiling of a rule is `rate`, NOT `rate + burst`. Burst only buys tolerance
# for short spikes, and it buys it by adding latency, not capacity.
#
# Note also: limit-req state is per-APISIX-node. There is 1 replica today
# (verified: deployment sfg-apisix, replicas=1), so the configured rate is the
# real rate. If APISIX is ever scaled out, the effective platform-wide limit is
# multiplied by the replica count and these numbers must be divided
# accordingly. helm/apisix/values.yaml carries a back-reference to this note at
# its replicaCount setting.
# ---------------------------------------------------------------------------
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-faithandgamble-tls
  namespace: sfg-labs
spec:
  secretName: api-faithandgamble-tls
  dnsNames:
    - api.faithandgamble.in
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: api-faithandgamble
  namespace: sfg-labs
spec:
  ingressClassName: apisix
  hosts:
    - api.faithandgamble.in
  secret:
    name: api-faithandgamble-tls
    namespace: sfg-labs
---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: suwalka-auth
  namespace: sfg-labs
  labels:
    sfg-project: suwalka
    sfg-auth: mixed
spec:
  ingressClassName: apisix
  http:
    # Public front door — no openid-connect (these are how you GET a token + view docs).
    - name: suwalka-auth-public
      match:
        hosts:
          - api.faithandgamble.in
        paths:
          - /auth/login
          - /auth/refresh
          - /auth/logout
          - /auth/docs
          - /auth/docs/*
        methods: [GET, POST, OPTIONS]
      backends:
        - serviceName: suwalka-auth
          servicePort: 3000
      plugins:
        # Browser clients (admin-web) POST JSON here, which triggers a CORS
        # preflight OPTIONS the backend itself doesn't handle (tsoa only
        # generates the POST route) — answer it at the gateway instead.
        # ------------------------------------------------------------------
        # CORS HERE REFLECTS DEPLOYED REALITY — DO NOT "FIX" IT IN PASSING.
        #
        # `allow_origins: '**'` together with `allow_credential: true` is the
        # classic unsafe CORS combination and will look like a bug. It is
        # recorded here because it is what is actually running on the cluster
        # (verified against the live ApisixRoute, 2026-07-20).
        #
        # An earlier revision of this file carried stricter values (an explicit
        # origin list, `allow_credential: false`, `allow_methods: POST,OPTIONS`).
        # Those were NEVER applied: they reached this file without being
        # reviewed as a security change, and applying them would also have
        # broken `GET /auth/docs`, which is served by this same rule but is not
        # in a POST,OPTIONS method list. The file has been reconciled DOWN to
        # the live values so that a CD run is a no-op rather than an unreviewed
        # security + availability change applied by a deploy script.
        #
        # Tightening this is a deliberate follow-up with its own testing, not a
        # drive-by edit. Before narrowing `allow_origins`, the origin list must
        # be verified against every real caller (admin-web prod and dev, local
        # dev hosts, mobile/webview clients, anything else that presents an
        # Origin header) — an origin missing from that list fails preflight
        # silently, with no ACAO header and a client-side block that is not
        # visible in gateway logs.
        # ------------------------------------------------------------------
        - name: cors
          enable: true
          config:
            allow_origins: "**"
            allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type,Accept,Idempotency-Key,X-Request-Id,X-Gate-Token,X-Tenant-Id,X-Branch-Id,X-Org-Id"
            allow_credential: true
            max_age: 3600
        - name: request-id
          enable: true
          config:
            header_name: X-Request-Id
            include_in_response: true
        - name: response-rewrite
          enable: true
          config:
            headers:
              set:
                X-Gateway: sfg-labs
                X-Project: suwalka
        # NOTE: limit-req is last in this list to match the deployed object
        # exactly, so that `kubectl diff` on this file is clean. Plugin
        # execution order in APISIX is by plugin priority, not by position in
        # this array, so the ordering here is cosmetic — but it is load-bearing
        # for drift detection. Keep it.
        - name: limit-req
          enable: true
          config:
            # SUSTAINED ceiling = rate = 30 req/s. Burst 30 does not add
            # capacity — it lets a 30 req/s overshoot be DELAYED rather than
            # 429'd (see "HOW TO READ rate AND burst" in the header).
            #
            # Sizing: this rule also carries /auth/refresh, which every active
            # session hits on its own schedule, and /auth/docs. Peak legitimate
            # load is a shift-change login storm — ~532 provisioned employees,
            # worst case a whole outlet (~100 staff) logging in inside a minute,
            # each costing a CORS preflight OPTIONS plus the POST: roughly
            # 3-6 req/s, plus refresh traffic well under 1 req/s.
            #
            # Re-checked against the corrected leaky-bucket reading: 30 req/s
            # sustained is 5-10x that peak, not the 10-20x an earlier draft
            # claimed. That is still comfortable. The stress case is the storm
            # compressing rather than growing — 100 staff x 2 requests landing
            # inside 10s is ~20 req/s, which still fits under 30, and burst 30
            # absorbs the overshoot above that by delaying it instead of
            # failing it. Keeping 30/30 rather than raising: the binding risk
            # on this route is the shared bucket 429ing innocent staff, and
            # 5-10x headroom over a peak we have actually measured is the right
            # side of that trade.
            #
            # The headroom is intentional: because remote_addr collapses to a
            # node IP for most traffic (see the header comment), this bucket is
            # shared platform-wide, so anything near real peak load would 429
            # innocent staff. Tighter than the 60/30 general-API precedent used
            # by the other services, but not "tight" — tight is unsafe until
            # source-IP preservation is fixed.
            #
            # Deviation from the tier table in docs/adding-a-service.md: this
            # is a credential surface, so it sits below "Standard API" (100/50)
            # rather than on it; burst is raised over "Low-volume" (30/15) to
            # absorb shift-change login spikes without 429ing staff.
            rate: 30
            burst: 30
            rejected_code: 429
            key_type: var
            key: remote_addr
    # Provisioning admin surface — JWT-protected (gateway injects X-Userinfo).
    - name: suwalka-auth-admin
      match:
        hosts:
          - api.faithandgamble.in
        paths:
          - /auth/admin/*
        methods: [GET, POST, PUT, PATCH, DELETE]
      backends:
        - serviceName: suwalka-auth
          servicePort: 3000
      plugins:
        # This rule IS deployed with cors, even though an earlier revision of
        # this file omitted the plugin entirely. Applying that revision would
        # have STRIPPED CORS from /auth/admin/*, breaking every browser caller
        # of the provisioning surface. Restored here to match live — see the
        # CORS note on the public rule above for why the values are what they
        # are and what tightening them requires.
        - name: cors
          enable: true
          config:
            allow_origins: "**"
            allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type,Accept,Idempotency-Key,X-Request-Id,X-Gate-Token,X-Tenant-Id,X-Branch-Id,X-Org-Id"
            allow_credential: true
            max_age: 3600
        - name: openid-connect
          enable: true
          config:
            discovery: https://sfg-labs.faithandgamble.in/.well-known/openid-configuration
            bearer_only: true
            realm: suwalka
            client_id: "bearer-only-unused"
            client_secret: "bearer-only-unused"
            use_jwks: true
            set_userinfo_header: true
            userinfo_header_name: X-Userinfo
            token_signing_alg_values_expected: RS256
        - name: request-id
          enable: true
          config:
            header_name: X-Request-Id
            include_in_response: true
        - name: limit-req
          enable: true
          config:
            # SUSTAINED ceiling = rate = 100 req/s (burst 100 delays an
            # overshoot, it does not raise the ceiling) — deliberately
            # generous, and looser than the public rule above. Reasoning:
            #
            #   * This surface is bearer-only JWT-gated, so an unauthenticated
            #     attacker cannot reach it at all. The threat a tight limit
            #     would address is largely already handled by openid-connect.
            #   * The legitimate caller is org-hr-payroll doing machine-to-
            #     machine provisioning, including bulk imports (the last one
            #     covered 532 employees). Those calls originate from a single
            #     pod, so they all share ONE limit-req key — a tight limit here
            #     would 429 a bulk import halfway through and leave employees
            #     half-provisioned, which is a worse failure than the flood it
            #     would be preventing.
            #
            # So this exists only as a backstop against a runaway retry loop,
            # sized well above any plausible bulk provisioning burst rather
            # than as a security control.
            #
            # Deviation from the tier table in docs/adding-a-service.md: that
            # table puts "admin, config" at 30/15, which this deliberately
            # exceeds. A 45 req/s ceiling risks 429ing a parallelised bulk
            # provisioning run and leaving employees half-provisioned — a worse
            # outcome than the flood it would prevent on a JWT-gated M2M route.
            rate: 100
            burst: 100
            rejected_code: 429
            key_type: var
            key: remote_addr
    # Forced password change on first login — PUBLIC by construction.
    #
    # Employees are provisioned with a one-time password handed over in person
    # by HR; Zitadel forces a change at first login and this is where the
    # permanent password is set. It verifies a credential WITHOUT a session, so
    # it is inherently an oracle for both user-existence and password guessing,
    # and it is the most abuse-prone route on the platform.
    #
    # It gets its own http rule purely so it can carry a tighter limit-req than
    # /auth/login — APISIX plugins apply per-rule, so sharing the public rule
    # above would force both onto one limit.
    - name: suwalka-auth-password-change
      match:
        hosts:
          - api.faithandgamble.in
        paths:
          # Both spellings are matched deliberately. APISIX paths are exact
          # (no wildcard here), but Express runs with strict routing OFF, so
          # the backend serves /auth/password/change/ identically. Listing only
          # the bare path would 404 the trailing-slash form at the gateway for
          # a request the backend would have accepted — a mismatch that is
          # latent today (no caller references the path yet) and would surface
          # as a confusing gateway-vs-backend discrepancy the first time some
          # client or proxy normalised the URL with a trailing slash.
          - /auth/password/change
          - /auth/password/change/
        methods: [POST, OPTIONS]
      backends:
        - serviceName: suwalka-auth
          servicePort: 3000
      plugins:
        # admin-web POSTs JSON here from the browser, so the same preflight
        # problem as the public rule applies — the backend only serves POST.
        # Without this the preflight fails and the endpoint is unreachable from
        # the UI, which is the exact dead-end this route is meant to remove.
        #
        # Values are copied from the public rule above and match what is
        # deployed — see the CORS note there before changing them. The two
        # rules are tightened together or not at all; a browser that can reach
        # /auth/login but not /auth/password/change is a dead end for exactly
        # the first-login users this route exists to serve.
        - name: cors
          enable: true
          config:
            allow_origins: "**"
            allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type,Accept,Idempotency-Key,X-Request-Id,X-Gate-Token,X-Tenant-Id,X-Branch-Id,X-Org-Id"
            allow_credential: true
            max_age: 3600
        - name: request-id
          enable: true
          config:
            header_name: X-Request-Id
            include_in_response: true
        - name: limit-req
          enable: true
          config:
            # SUSTAINED ceiling = rate = 5 req/s (burst 10 delays an overshoot,
            # it does not raise the ceiling). Much tighter than /auth/login
            # because legitimate demand is near zero: an employee changes their
            # initial password exactly once, ever. Even an HR-led onboarding
            # session putting 50 new joiners through it inside ten minutes is
            # under 0.1 req/s.
            #
            # READ THIS BEFORE TRUSTING THAT HEADROOM. An earlier draft said
            # this "will not lock out an onboarding batch even though the
            # bucket is effectively shared". That is true only when nobody is
            # attacking. Under the exact flood this limit exists to stop it is
            # FALSE, and this is the route where the shared-bucket problem
            # bites hardest:
            #
            #   * Access-log sampling (20k lines, 2026-07-20) found /auth/*
            #     arriving SNAT'd to a node IP 12 times vs 4 times with a real
            #     client IP — so ~75% of legitimate traffic here shares a
            #     bucket, worse than the ~2/3 the header comment estimates.
            #   * An attacker whose traffic SNATs to 10.104.0.3 exhausts that
            #     5 req/s bucket outright. Every legitimate first-login
            #     password change routed through the same node IP then gets a
            #     persistent 429.
            #   * Because /auth/login returns 403 PASSWORD_CHANGE_REQUIRED
            #     until the change succeeds, such an employee is FULLY LOCKED
            #     OUT for the duration of the flood. There is no workaround
            #     available to them — this is the one action they cannot route
            #     around.
            #
            # Blast radius is bounded: already-provisioned staff keep logging
            # in normally, only first-login users are affected. And it still
            # beats having no limit. But it is a real availability failure
            # mode, not a hypothetical one, and it should be stated as such.
            #
            # WHY 5 AND NOT HIGHER, given that consequence: raising the rate
            # does not buy availability under the flood. Saturation is
            # attacker-controlled — an attacker floods to whatever rate is
            # needed to fill the bucket, so 10 or 20 req/s gets exhausted just
            # as completely as 5, while multiplying the guesses/day an attacker
            # gets for free. Headroom is not the binding constraint here;
            # source-IP attribution is. Raising the number trades real security
            # for availability that would not actually materialise.
            #
            # Nor is it lowered: legitimate demand (~0.1 req/s) would tolerate
            # 1-2 req/s, but that gain is marginal against an attacker and it
            # eats the margin the dev environment needs for parallel test runs.
            #
            # What this cap actually is: a volumetric backstop. 5 req/s is
            # still ~432k attempts/day, so it is NOT a brute-force control, and
            # per the header comment there is currently NO per-account lockout
            # behind it (Zitadel max_password_attempts = 0). The two changes
            # that would actually fix this route are (a) enabling Zitadel
            # account lockout and (b) restoring source-IP preservation so this
            # limit becomes per-client. Until then, do not read this number as
            # protection.
            #
            # Concurrency note: suwalka-auth holds every password-change
            # response to a 1200ms constant-time floor. A fully-engaged burst
            # (rate+burst = 15 req/s admitted) therefore implies up to ~18
            # concurrent in-flight requests against that backend, and delayed
            # burst requests hold a gateway connection while they sleep. Keep
            # that in mind before raising either number.
            #
            # Deviation from the tier table in docs/adding-a-service.md: below
            # every tier there, including "Webhooks (public)" (20/10), because
            # legitimate demand is a once-per-employee-lifetime action.
            rate: 5
            burst: 10
            rejected_code: 429
            key_type: var
            key: remote_addr
        - name: response-rewrite
          enable: true
          config:
            headers:
              set:
                X-Gateway: sfg-labs
                X-Project: suwalka
