apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: suwalka-notification
  namespace: sfg-labs
  labels:
    sfg-project: suwalka
    sfg-auth: jwt
  annotations:
    sfg-labs.in/description: "Suwalka Motors — Notification service (SMS/WhatsApp via MSG91)"
    sfg-labs.in/team: "suwalka-team"
    sfg-labs.in/upstream: "suwalka-notification:3007"
spec:
  ingressClassName: apisix
  http:
  - name: suwalka-notification-api
    match:
      hosts:
      - api.suwalka-pos.sfg-labs.in
      paths:
      - /api/notification/*
      - /api/notify/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    backends:
    - serviceName: suwalka-notification
      servicePort: 3007
      weight: 100
    plugins:
    # admin-web's NotificationBell (navbar) polls GET /api/notify/me directly from
    # the browser, which triggers a CORS preflight OPTIONS with no Authorization
    # header. The cors plugin runs at higher APISIX priority than openid-connect,
    # so it answers the preflight itself (never reaching the auth check) and stamps
    # Access-Control-Allow-Origin on the real response once a bearer token gets
    # through. Same template as routes/suwalka-org-hr-payroll.yaml.
    - name: cors
      enable: true
      config:
        allow_origins: "http://localhost:3000,http://localhost:3010,https://suwalka.faithandgamble.in,https://suwalka-dev.faithandgamble.in,http://suwalka-dev.faithandgamble.in"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "*"
        allow_credential: false
        max_age: 3600
    - name: openid-connect
      enable: true
      config:
        discovery: https://sfg-labs.faithandgamble.in/.well-known/openid-configuration
        bearer_only: true
        client_id: "bearer-only-unused"
        client_secret: "bearer-only-unused"
        realm: suwalka
        set_userinfo_header: true
        userinfo_header_name: X-Userinfo
        set_id_token_header: false
        set_access_token_header: false
        token_signing_alg_values_expected: RS256
        timeout: 3
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 60
        burst: 30
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka
