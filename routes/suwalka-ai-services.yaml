# NAMESPACE NOTE: this ApisixRoute lives in sfg-labs (set via metadata.namespace) because
# the APISIX ingress controller (ApisixRoute v2) routes only to Services in the route's OWN
# namespace — backends[].serviceNamespace is not supported. All Suwalka routes therefore live
# in sfg-labs, alongside the suwalka-* Service objects (see routes/suwalka-org-hr-payroll.yaml).
#
# AUTH NUANCE — this service accepts THREE caller shapes on the same /v1/* paths
# (see suwalka-ai-services/docs/deployment.md §5 for the full write-up):
#   1. Human/browser JWTs minted by suwalka-auth — validated by openid-connect
#      (bearer_only: true), same shared realm ("suwalka") as every other Suwalka route.
#   2. Peer services (e.g. suwalka-recruitment) presenting X-Internal-Token — no
#      Authorization header at all.
#   3. Tenant-scoped API keys, `Authorization: Bearer sk-suwalka-...` — NOT a JWT.
# openid-connect with bearer_only: true unconditionally validates whatever sits in
# Authorization as an OIDC JWT and 401s anything else, so shapes (2) and (3) get their
# own higher-priority routes that skip openid-connect entirely — the service's own
# auth layer (suwalka_ai/config.py: gateway_shared_secret / internal_token / api_keys)
# is the authority for those two. This mirrors helm/suwalka-ai-services/templates/
# apisix-route.yaml in the service repo (kept disabled there — this file is canonical).
#
# Canonical chart reference (service repo, disabled by default):
#   suwalka-ai-services/helm/suwalka-ai-services/templates/apisix-route.yaml
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: suwalka-ai-services
  namespace: sfg-labs
  labels:
    sfg-project: suwalka
    sfg-service: ai-resume-screening
    sfg-auth: jwt
  annotations:
    sfg-labs.in/description: "Suwalka AI Services — Resume Screening API"
    sfg-labs.in/team: "ai-services"
    sfg-labs.in/upstream: "suwalka-ai-services:3012"
spec:
  ingressClassName: apisix
  http:
  - name: suwalka-ai-services-m2m-internal-token
    priority: 10
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      # Presence check: any non-empty X-Internal-Token header (peer services only).
      vars:
      - ["http_x_internal_token", "~~", ".+"]
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  - name: suwalka-ai-services-m2m-api-key
    priority: 10
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      # Tenant API keys are NOT JWTs — openid-connect would reject them. `~~` is
      # APISIX's PCRE match operator for `vars`.
      vars:
      - ["http_authorization", "~~", "^Bearer sk-suwalka-"]
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  - name: suwalka-ai-services-api-jwt
    # Default priority (lower than the two M2M routes above): only matched when
    # neither M2M marker is present — i.e. a real end-user JWT from suwalka-auth.
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    # Browser clients (admin-web) may call this route directly, which triggers a
    # CORS preflight OPTIONS with no Authorization header. cors runs at a higher
    # APISIX priority than openid-connect and answers the preflight itself — same
    # pattern as routes/suwalka-org-hr-payroll.yaml.
    - name: cors
      enable: true
      config:
        allow_origins: "http://localhost:3000,http://localhost:8081,https://suwalka.faithandgamble.in,https://suwalka-dev.faithandgamble.in,http://suwalka-dev.faithandgamble.in"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "*"
        allow_credential: false
        max_age: 3600
    - name: openid-connect
      enable: true
      config:
        discovery: https://sfg-labs.faithandgamble.in/.well-known/openid-configuration
        bearer_only: true
        client_id: "bearer-only-unused"
        client_secret: "bearer-only-unused"
        realm: suwalka
        use_jwks: true
        set_userinfo_header: true
        userinfo_header_name: X-Userinfo
        set_id_token_header: false
        set_access_token_header: false
        token_signing_alg_values_expected: RS256
        timeout: 3
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  # Health/readiness — no auth plugin (K8s/gateway probes carry no credential).
  - name: suwalka-ai-services-health
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /healthz
      - /readyz
      methods:
      - GET
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true

  # FastAPI's default Swagger/OpenAPI surface (no docs_url/openapi_url override in
  # suwalka_ai/api/app.py) — public, same as health, so operators/integrators can
  # reach it through the gateway rather than only via a port-forward.
  - name: suwalka-ai-services-docs
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /docs
      - /redoc
      - /openapi.json
      methods:
      - GET
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
