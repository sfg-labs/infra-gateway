# NAMESPACE NOTE: this ApisixRoute lives in sfg-labs (set via metadata.namespace) because
# the APISIX ingress controller (ApisixRoute v2) routes only to Services in the route's OWN
# namespace — backends[].serviceNamespace is not supported. All Suwalka routes therefore live
# in sfg-labs, alongside the suwalka-* Service objects (see routes/suwalka-org-hr-payroll.yaml).
#
# PATH PREFIX — this service is also reachable under /ai-service/* (an alias of the
# bare /v1/* routes below, same backend, via proxy-rewrite stripping the prefix).
# Added because a bare, unprefixed /docs (FastAPI's default Swagger UI path) collided
# with other services on this shared host — generic paths like /docs, /redoc,
# /openapi.json aren't namespaced per-service. /ai-service/docs is now the reachable
# Swagger UI; the API container runs with --root-path /ai-service (helm chart
# deployment.yaml) so the docs page's runtime openapi.json fetch and the spec's
# `servers` entry (which Swagger UI's "Try it out" uses) both resolve under this
# prefix instead of the bare root. The bare /v1/* routes stay live and unchanged for
# existing peer-service/tenant-API-key callers — this prefix is additive, not a
# replacement.
#
# AUTH NUANCE — this service accepts THREE caller shapes on the same /v1/* paths
# (see suwalka-ai-services/docs/deployment.md §5 for the full write-up):
#   1. Human/browser JWTs minted by suwalka-auth — validated by openid-connect
#      (bearer_only: true), same shared realm ("suwalka") as every other Suwalka route.
#   2. Peer services (e.g. suwalka-recruitment) presenting X-Internal-Token — no
#      Authorization header at all.
#   3. Tenant-scoped API keys, `Authorization: Bearer sk-suwalka-...` — NOT a JWT.
# openid-connect with bearer_only: true unconditionally validates whatever sits in
# Authorization as an OIDC JWT and 401s anything else, so shapes (2) and (3) get their
# own higher-priority routes that skip openid-connect entirely — the service's own
# auth layer (suwalka_ai/config.py: gateway_shared_secret / internal_token / api_keys)
# is the authority for those two. This mirrors helm/suwalka-ai-services/templates/
# apisix-route.yaml in the service repo (kept disabled there — this file is canonical).
#
# Canonical chart reference (service repo, disabled by default):
#   suwalka-ai-services/helm/suwalka-ai-services/templates/apisix-route.yaml
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: suwalka-ai-services
  namespace: sfg-labs
  labels:
    sfg-project: suwalka
    sfg-service: ai-resume-screening
    sfg-auth: jwt
  annotations:
    sfg-labs.in/description: "Suwalka AI Services — Resume Screening API"
    sfg-labs.in/team: "ai-services"
    sfg-labs.in/upstream: "suwalka-ai-services:3012"
spec:
  ingressClassName: apisix
  http:
  - name: suwalka-ai-services-m2m-internal-token
    priority: 10
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      # Presence check: any non-empty X-Internal-Token header (peer services only).
      # This CRD version has no `vars` field (older APISIX-native triple-array
      # syntax) — the installed apisix-ingress-controller uses the structured
      # `exprs` format instead.
      exprs:
      - subject:
          scope: Header
          name: X-Internal-Token
        op: RegexMatch
        value: ".+"
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  - name: suwalka-ai-services-m2m-api-key
    priority: 10
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      # Tenant API keys are NOT JWTs — openid-connect would reject them. This CRD
      # version has no `vars` field; use the structured `exprs` format instead.
      exprs:
      - subject:
          scope: Header
          name: Authorization
        op: RegexMatch
        value: "^Bearer sk-suwalka-"
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  - name: suwalka-ai-services-api-jwt
    # Default priority (lower than the two M2M routes above): only matched when
    # neither M2M marker is present — i.e. a real end-user JWT from suwalka-auth.
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    # After openid-connect validates the JWT and sets X-Userinfo, inject X-Gateway-Secret
    # so the service's _from_gateway trusts that X-Userinfo (it is the proof the request
    # came from APISIX, not a client that reached the ClusterIP off-gateway with a forged
    # X-Userinfo). Value is substituted at deploy time by envsubst in helm/deploy.sh from
    # the SUWALKA_AI_GATEWAY_SECRET GitHub Secret — the literal secret is never committed.
    # MUST be applied via helm/deploy.sh (envsubst); a bare `kubectl apply` of this file
    # ships the placeholder verbatim and the service will 401 every browser JWT.
    - name: proxy-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway-Secret: ${SUWALKA_AI_GATEWAY_SECRET}
    # Browser clients (admin-web) may call this route directly, which triggers a
    # CORS preflight OPTIONS with no Authorization header. cors runs at a higher
    # APISIX priority than openid-connect and answers the preflight itself — same
    # pattern as routes/suwalka-org-hr-payroll.yaml.
    - name: cors
      enable: true
      config:
        allow_origins: "http://localhost:3000,http://localhost:8081,https://suwalka.faithandgamble.in,https://suwalka-dev.faithandgamble.in,http://suwalka-dev.faithandgamble.in"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "*"
        allow_credential: false
        max_age: 3600
    - name: openid-connect
      enable: true
      config:
        discovery: https://sfg-labs.faithandgamble.in/.well-known/openid-configuration
        bearer_only: true
        client_id: "bearer-only-unused"
        client_secret: "bearer-only-unused"
        realm: suwalka
        use_jwks: true
        set_userinfo_header: true
        userinfo_header_name: X-Userinfo
        set_id_token_header: false
        set_access_token_header: false
        token_signing_alg_values_expected: RS256
        timeout: 3
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  # Health/readiness — no auth plugin (K8s/gateway probes carry no credential).
  - name: suwalka-ai-services-health
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /healthz
      - /readyz
      methods:
      - GET
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true

  # FastAPI's default Swagger/OpenAPI surface (no docs_url/openapi_url override in
  # suwalka_ai/api/app.py) — public, same as health, so operators/integrators can
  # reach it through the gateway rather than only via a port-forward. Served under
  # /ai-service/* (see the PATH PREFIX note above) rather than bare /docs, which
  # collided with other services on this shared host.
  - name: suwalka-ai-services-docs
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /ai-service/docs
      - /ai-service/redoc
      - /ai-service/openapi.json
      methods:
      - GET
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: proxy-rewrite
      enable: true
      config:
        regex_uri:
        - "^/ai-service(.*)"
        - "$1"
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true

  # /ai-service/v1/* — alias of the bare /v1/* M2M-internal-token route above, same
  # backend, prefix stripped by proxy-rewrite. Exists so Swagger UI's "Try it out"
  # (which calls the openapi spec's `servers`-prefixed URL) has somewhere to land;
  # the bare /v1/* routes remain the primary path for existing callers.
  - name: suwalka-ai-services-prefixed-m2m-internal-token
    priority: 10
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /ai-service/v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      exprs:
      - subject:
          scope: Header
          name: X-Internal-Token
        op: RegexMatch
        value: ".+"
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: proxy-rewrite
      enable: true
      config:
        regex_uri:
        - "^/ai-service(.*)"
        - "$1"
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  # /ai-service/v1/* — alias of the bare /v1/* M2M-api-key route above.
  - name: suwalka-ai-services-prefixed-m2m-api-key
    priority: 10
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /ai-service/v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      exprs:
      - subject:
          scope: Header
          name: Authorization
        op: RegexMatch
        value: "^Bearer sk-suwalka-"
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: proxy-rewrite
      enable: true
      config:
        regex_uri:
        - "^/ai-service(.*)"
        - "$1"
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services

  # /ai-service/v1/* — alias of the bare /v1/* JWT route above (default priority,
  # falls through only when neither M2M marker above matched).
  - name: suwalka-ai-services-prefixed-api-jwt
    match:
      hosts:
      - api.faithandgamble.in
      paths:
      - /ai-service/v1/*
      methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    backends:
    - serviceName: suwalka-ai-services
      servicePort: 3012
      weight: 100
    plugins:
    - name: proxy-rewrite
      enable: true
      config:
        regex_uri:
        - "^/ai-service(.*)"
        - "$1"
        # Same X-Gateway-Secret injection as the bare /v1/* JWT route (see note above).
        # envsubst substitutes ONLY ${SUWALKA_AI_GATEWAY_SECRET}, leaving the $1 regex ref
        # intact (deploy.sh passes an explicit var list to envsubst).
        headers:
          set:
            X-Gateway-Secret: ${SUWALKA_AI_GATEWAY_SECRET}
    - name: cors
      enable: true
      config:
        allow_origins: "http://localhost:3000,http://localhost:8081,https://suwalka.faithandgamble.in,https://suwalka-dev.faithandgamble.in,http://suwalka-dev.faithandgamble.in"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "*"
        allow_credential: false
        max_age: 3600
    - name: openid-connect
      enable: true
      config:
        discovery: https://sfg-labs.faithandgamble.in/.well-known/openid-configuration
        bearer_only: true
        client_id: "bearer-only-unused"
        client_secret: "bearer-only-unused"
        realm: suwalka
        use_jwks: true
        set_userinfo_header: true
        userinfo_header_name: X-Userinfo
        set_id_token_header: false
        set_access_token_header: false
        token_signing_alg_values_expected: RS256
        timeout: 3
    - name: request-id
      enable: true
      config:
        header_name: X-Request-Id
        include_in_response: true
    - name: limit-req
      enable: true
      config:
        rate: 80
        burst: 40
        rejected_code: 429
        key_type: var
        key: remote_addr
    - name: response-rewrite
      enable: true
      config:
        headers:
          set:
            X-Gateway: sfg-labs
            X-Project: suwalka-ai-services
