name: CD

# Deploys the gateway (Postgres + Zitadel + APISIX + routes) to the DigitalOcean
# Kubernetes cluster. Manual trigger only — a gateway should not redeploy on every
# push. (To auto-deploy on merge, add `push: { branches: [main] }` below.)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DOKS_KUBECONFIG      full contents of your DigitalOcean cluster kubeconfig file
#                        (the embedded token authenticates kubectl directly — no doctl/PAT)
#   ZITADEL_DB_PASSWORD  Postgres password for the zitadel role (any strong value)
#   ZITADEL_MASTERKEY    Zitadel master key — MUST be exactly 32 characters
#   APISIX_ADMIN_KEY     APISIX admin API key (any strong value)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm a production gateway deploy'
        required: true
        default: ''

concurrency:
  group: cd-doks
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DOKS
    # Self-hosted, matching CI and every other sfg-labs repo. GitHub-hosted minutes
    # are not dependable across this org (see showroom-ai-reel, billing-blocked), and a
    # deploy that cannot start is worse than one that runs on our own box.
    #
    # SECURITY: unlike an ephemeral ubuntu-latest VM, a self-hosted runner's workspace
    # PERSISTS between jobs on a box shared by ~6 runners across the estate. The
    # kubeconfig written below is full cluster-admin, so it MUST be removed on every
    # exit path — see the "Scrub the kubeconfig" step at the end of this job.
    runs-on: [self-hosted, linux, x64]
    env:
      KUBECONFIG: ${{ github.workspace }}/.kubeconfig
    steps:
      - name: Guard — require explicit confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "deploy" ]]; then
            echo "::error::Type 'deploy' in the confirm input to run this workflow."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Write kubeconfig from secret
        env:
          DOKS_KUBECONFIG: ${{ secrets.DOKS_KUBECONFIG }}
        run: |
          printf '%s' "$DOKS_KUBECONFIG" > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Ensure namespaces
        run: kubectl apply -f k8s/namespaces.yaml

      - name: Create secrets from GitHub Secrets
        env:
          ZITADEL_DB_PASSWORD: ${{ secrets.ZITADEL_DB_PASSWORD }}
          ZITADEL_MASTERKEY: ${{ secrets.ZITADEL_MASTERKEY }}
          APISIX_ADMIN_KEY: ${{ secrets.APISIX_ADMIN_KEY }}
        run: |
          set -euo pipefail

          if [[ "${#ZITADEL_MASTERKEY}" -ne 32 ]]; then
            echo "::error::ZITADEL_MASTERKEY must be exactly 32 characters (got ${#ZITADEL_MASTERKEY})."
            exit 1
          fi

          # zitadel-db — same value for the runtime (User) and admin connections,
          # since the postgres container's POSTGRES_USER=zitadel is the superuser.
          kubectl -n sfg-gateway create secret generic zitadel-db \
            --from-literal=user-password="$ZITADEL_DB_PASSWORD" \
            --from-literal=admin-password="$ZITADEL_DB_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

          # zitadel-masterkey — referenced by helm/zitadel/values.yaml (masterkeySecretName).
          kubectl -n sfg-gateway create secret generic zitadel-masterkey \
            --from-literal=masterkey="$ZITADEL_MASTERKEY" \
            --dry-run=client -o yaml | kubectl apply -f -

          # apisix-admin-key — helm/deploy.sh reads this and wires it into the chart.
          kubectl -n sfg-gateway create secret generic apisix-admin-key \
            --from-literal=key="$APISIX_ADMIN_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy in-cluster Postgres
        run: |
          set -euo pipefail
          kubectl apply -f helm/zitadel/postgres.yaml
          echo "Waiting for Postgres to become ready..."
          kubectl -n sfg-gateway rollout status statefulset/zitadel-db-postgresql --timeout=180s

      - name: Install envsubst (gettext-base)
        # Self-hosted runners are long-lived, so envsubst is usually already present
        # and re-running apt-get every deploy is both slow and needlessly privileged.
        # Only install when genuinely missing; fail loudly if we cannot get it.
        run: |
          if command -v envsubst >/dev/null 2>&1; then
            echo "envsubst present: $(command -v envsubst)"
          else
            echo "envsubst missing — installing gettext-base"
            sudo apt-get update && sudo apt-get install -y gettext-base
          fi

      - name: Deploy gateway (Zitadel + APISIX + routes)
        env:
          # Substituted into routes/suwalka-ai-services.yaml's X-Gateway-Secret injection
          # by envsubst in helm/deploy.sh — keeps the secret out of git.
          SUWALKA_AI_GATEWAY_SECRET: ${{ secrets.SUWALKA_AI_GATEWAY_SECRET }}
        run: bash helm/deploy.sh

      - name: Report deployment state
        if: always()
        run: |
          echo "===> Services (look for the APISIX LoadBalancer EXTERNAL-IP)"
          kubectl -n sfg-gateway get svc -o wide || true
          echo "===> ApisixRoutes"
          kubectl -n sfg-gateway get apisixroutes || true
          echo "===> Pods"
          kubectl -n sfg-gateway get pods -o wide || true

      # MUST be the last step, and MUST run on every exit path.
      # On a self-hosted runner the workspace survives the job, on a box shared by
      # ~6 runners across the estate. Leaving a full cluster-admin kubeconfig on disk
      # would let any later job on this runner — from any repo in the group — take the
      # cluster. This step is the entire reason the self-hosted switch is safe.
      - name: Scrub the kubeconfig
        if: always()
        run: |
          rm -f "$KUBECONFIG" || true
          if [[ -e "$KUBECONFIG" ]]; then
            echo "::error::Failed to remove $KUBECONFIG from a persistent runner workspace."
            exit 1
          fi
          echo "kubeconfig scrubbed from the runner workspace."
