# Zitadel Helm values — sfg-labs infra-gateway
# Chart: zitadel/zitadel  (helm repo add zitadel https://charts.zitadel.com)
# Deployed to namespace: sfg-gateway
#
# BEFORE DEPLOYING — create these K8s secrets:
#   kubectl -n sfg-gateway create secret generic zitadel-masterkey \
#     --from-literal=masterkey=$(openssl rand -base64 32)
#
#   kubectl -n sfg-gateway create secret generic zitadel-db \
#     --from-literal=password=YOUR_POSTGRES_PASSWORD

replicaCount: 1   # single-node DOKS cluster — anti-affinity gives no HA on one node

zitadel:
  # The masterkey secret must be created manually before deploy (see above)
  masterkeySecretName: zitadel-masterkey

  configmapConfig:
    ExternalSecure: true
    ExternalDomain: sfg-labs.faithandgamble.in   # ← auth/console domain (GoDaddy A record → LB IP)
    ExternalPort: 443

    TLS:
      Enabled: false   # TLS terminated at APISIX (cert-manager cert via ApisixTls)

    Database:
      Postgres:
        # In-cluster Bitnami Postgres (deployed as release "zitadel-db" in sfg-gateway).
        # Was 10.0.0.4 (Cantech VLAN db-01) — does not exist on DOKS.
        Host: "zitadel-db-postgresql.sfg-gateway.svc.cluster.local"
        Port: 5432
        Database: zitadel
        # Runtime user — owns the zitadel database (created by Bitnami auth.username).
        User:
          Username: zitadel
          # Password injected via ZITADEL_DATABASE_POSTGRES_USER_PASSWORD env (see below).
          SSL:
            Mode: disable          # in-cluster traffic; use "require" for DO Managed Postgres
        # Admin user — used by the init job to create the DB/role and run migrations.
        # With the official postgres image + POSTGRES_USER=zitadel, "zitadel" IS the
        # superuser, so the runtime and admin connections use the same role.
        Admin:
          Username: zitadel
          # Password injected via ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD env (see below).
          SSL:
            Mode: disable

# Top-level env (NOT zitadel.env). The chart's zitadel.dbEnv helper injects .Values.env
# into the init/setup pre-install hook jobs AND the main deployment — so the DB password
# reaches the init job (zitadel.env does not). Passwords come from the zitadel-db secret.
env:
  - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: zitadel-db
        key: user-password
  - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: zitadel-db
        key: admin-password

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Spread across workers
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values: [zitadel]
        topologyKey: kubernetes.io/hostname

service:
  type: ClusterIP
  port: 8080

# Zitadel init job — runs DB migrations on first deploy
initJob:
  enabled: true

# Readiness / liveness
livenessProbe:
  httpGet:
    path: /debug/healthz
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /debug/ready
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 5
