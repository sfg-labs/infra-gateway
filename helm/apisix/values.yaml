# APISIX Helm values — sfg-labs infra-gateway
# Chart: apisix/apisix  (helm repo add apisix https://charts.apiseven.com)
# Deployed to namespace: sfg-gateway

# RATE LIMITS DEPEND ON THIS VALUE — read before scaling out.
# APISIX limit-req keeps its counter state PER NODE, not cluster-wide. Every
# `rate`/`burst` in routes/*.yaml was sized assuming this is 1, so raising it
# multiplies every rate limit in the estate by the new replica count. Raising
# this from 1 to 3 does not just add HA — it silently triples the effective
# ceiling on every credential route, including the deliberately tight
# /auth/password/change limit. If you change this, divide those numbers
# accordingly (or move limit-req to a shared-store policy first). The full
# reasoning, including why source-IP collapse makes these buckets shared, is in
# the header comment of routes/suwalka-auth.yaml.
replicaCount: 1   # single-node DOKS cluster — anti-affinity gives no HA on one node

apisix:
  enabled: true
  kind: Deployment

  # Enable the TLS listener (:9443) so APISIX can terminate HTTPS. Certs are supplied per-host
  # via ApisixTls CRDs (k8s/zitadel-tls.yaml), backed by cert-manager Let's Encrypt secrets.
  ssl:
    enabled: true
    containerPort: 9443

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
    prometheus.io/path: "/apisix/prometheus/metrics"

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
      add: [NET_BIND_SERVICE]

  # Spread pods across worker-01 and worker-02
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values: [apisix]
          topologyKey: kubernetes.io/hostname

# Gateway Service. The apisix chart's key is `service.*` (NOT `gateway.*`); its default
# type is NodePort. type: LoadBalancer makes DOKS provision a DigitalOcean LoadBalancer
# with a public IP. TLS is terminated at the LB/Cloudflare, so no service TLS here.
service:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  # NOTE: do NOT add service.beta.kubernetes.io/do-loadbalancer-hostname here — on this cluster
  # it caused DO to reconfigure the LB and drop external access (HTTP 000). In-cluster hairpin
  # (zitadel-login -> Zitadel API via the public host) works without it.
  http:
    enabled: true
    servicePort: 80
    containerPort: 9080
  # HTTPS — DOKS LoadBalancer also exposes :443 → APISIX TLS listener (:9443).
  tls:
    servicePort: 443

# etcd — single replica for Y1, set replicaCount: 3 for HA
etcd:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 4Gi
    storageClass: ""   # uses default storage class

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# APISIX Ingress Controller — watches ApisixRoute CRDs
ingress-controller:
  enabled: true

  config:
    apisix:
      serviceName: apisix-admin
      serviceNamespace: sfg-gateway
      servicePort: 9180
      # adminKey injected at deploy time — never hardcode here.
      # Set via: helm upgrade ... --set ingress-controller.config.apisix.adminKey="$(kubectl get secret apisix-admin-key -n sfg-gateway -o jsonpath='{.data.key}' | base64 -d)"
      adminKey: ""

    kubernetes:
      watchNamespaces:
        - sfg-gateway
        - sfg-apps
        - sfg-labs     # Suwalka services live here (see routes/suwalka-*.yaml)

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Dashboard — disabled in production (use kubectl port-forward when needed)
dashboard:
  enabled: false

# Prometheus metrics
serviceMonitor:
  enabled: false   # enable if you have Prometheus Operator installed
